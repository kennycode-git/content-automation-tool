<!-- SUBJECT: Reset your PassiveClip password -->

<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
<div class="pc-shell" style="background:#fff; border-radius:4px; overflow:hidden; font-family:Arial, sans-serif; max-width:600px">
  <div class="pc-header" style="background:#111; padding:28px 40px; text-align:left" align="left">
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:0;">
      <img src="https://www.passiveclip.com/logo.png" alt="" style="height:36px; width:auto; display:block;">
      <img src="https://www.passiveclip.com/just%20text.png" alt="PassiveClip" style="height:28px; width:auto; display:block;">
    </div>
  </div>
  <div class="pc-stripe" style="height:3px; background:#F5A623" height="3"></div>
  <div class="pc-body" style="padding:44px 40px 36px; background:#fff">
    <p class="lead" style="font-size:18px; line-height:1.75; color:#111; margin-bottom:20px; font-family:Arial, sans-serif; font-weight:700">Reset your password.</p>
    <p style="font-size:15px; line-height:1.75; color:#333; margin-bottom:16px; font-family:Arial, sans-serif">We got a request to reset the password on your PassiveClip account. Click below to choose a new one.</p>
    <div class="pc-cta" style="margin:32px 0">
      <a href="{{ .ConfirmationURL }}" class="pc-btn" style="display:inline-block; background:#F5A623; font-size:13px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; padding:15px 32px; text-decoration:none; border-radius:2px; font-family:Arial, sans-serif; color:#111">Reset password</a>
    </div>
    <hr class="pc-divider" style="border:none; border-top:1px solid #eee; margin:32px 0">
    <p class="pc-note" style="font-size:15px; color:#333; line-height:1.75; margin-bottom:16px; font-family:Arial, sans-serif">Didn't request this? Ignore it — your password hasn't changed. This link expires in 1 hour.</p>
  </div>
  <div class="pc-footer" style="background:#111; padding:20px 40px">
    <p style='font-size:11px; color:#555; line-height:1.8; font-family:"Courier New", monospace; letter-spacing:0.04em'>PassiveClip · Automated video for content creators</p>
  </div>
</div>
</body>
</html>
